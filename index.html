<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>客户装修需求表</title>
<style>
:root {
  --bg: #FBF9F6;
  --card: #FFFFFF;
  --primary: #B8956A;
  --primary-dark: #9A7B54;
  --text: #2C2416;
  --text-secondary: #8B7355;
  --border: #E8E0D5;
  --accent: #D4A574;
  --tag-bg: #F5F0E8;
  --tag-active: #F0E6D8;
  --tag-border-active: #B8956A;
  --danger: #C55555;
  --radius: 12px;
  --shadow: 0 2px 12px rgba(44,36,22,0.06);
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  padding-bottom: 80px;
  -webkit-tap-highlight-color: transparent;
}

/* 顶部品牌条 */
.header {
  background: linear-gradient(135deg, #3C3226 0%, #5C4A3A 100%);
  color: #FFF;
  text-align: center;
  padding: 28px 20px 24px;
  position: sticky;
  top: 0;
  z-index: 100;
}
.header h1 { font-size: 20px; font-weight: 600; letter-spacing: 1px; margin-bottom: 4px; }
.header p { font-size: 13px; opacity: 0.75; }

/* 进度条 */
.progress-wrap {
  background: #FFF;
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 88px;
  z-index: 99;
}
.progress-bar {
  height: 4px;
  background: var(--border);
  border-radius: 2px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: var(--primary);
  border-radius: 2px;
  transition: width 0.4s ease;
}
.progress-text {
  display: flex;
  justify-content: space-between;
  margin-top: 8px;
  font-size: 12px;
  color: var(--text-secondary);
}
.progress-text .step-name { font-weight: 500; }

/* 表单步骤 */
.container { max-width: 640px; margin: 0 auto; padding: 16px; }
.step { display: none; animation: fadeSlide 0.35s ease; }
.step.active { display: block; }
@keyframes fadeSlide {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}

/* 卡片 */
.card {
  background: var(--card);
  border-radius: var(--radius);
  padding: 20px;
  margin-bottom: 16px;
  box-shadow: var(--shadow);
  border: 1px solid var(--border);
}
.card-title {
  font-size: 17px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 4px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.card-title .icon { font-size: 20px; }
.card-subtitle { font-size: 12px; color: var(--text-secondary); margin-bottom: 16px; }

/* 字段 */
.field { margin-bottom: 18px; }
.field:last-child { margin-bottom: 0; }
.label {
  display: block;
  font-size: 14px;
  font-weight: 500;
  color: var(--text);
  margin-bottom: 8px;
}
.label .optional { color: var(--text-secondary); font-weight: 400; font-size: 12px; }

/* 文本输入 */
.input, .textarea {
  width: 100%;
  padding: 10px 14px;
  border: 1px solid var(--border);
  border-radius: 8px;
  font-size: 15px;
  color: var(--text);
  background: #FAFAF8;
  transition: border-color 0.2s;
  font-family: inherit;
}
.input:focus, .textarea:focus {
  outline: none;
  border-color: var(--primary);
  background: #FFF;
}
.textarea { min-height: 80px; resize: vertical; }

/* 行内组合 */
.row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
.row .input { flex: 1; min-width: 80px; }
.row .label-inline { font-size: 14px; white-space: nowrap; color: var(--text-secondary); }

/* 标签选择器 (多选/单选) */
.tag-group { display: flex; flex-wrap: wrap; gap: 8px; }
.tag {
  padding: 8px 16px;
  border: 1px solid var(--border);
  border-radius: 20px;
  font-size: 13px;
  color: var(--text-secondary);
  background: var(--tag-bg);
  cursor: pointer;
  transition: all 0.2s;
  user-select: none;
  display: inline-flex;
  align-items: center;
  gap: 4px;
}
.tag:active { transform: scale(0.96); }
.tag.selected {
  background: var(--tag-active);
  border-color: var(--tag-border-active);
  color: var(--text);
  font-weight: 500;
}
.tag.radio { border-radius: 20px; }
.tag.radio.selected {
  background: var(--primary);
  border-color: var(--primary);
  color: #FFF;
}

/* 上传区 */
.upload-area {
  border: 2px dashed var(--border);
  border-radius: var(--radius);
  padding: 24px;
  text-align: center;
  cursor: pointer;
  transition: border-color 0.2s;
  background: #FAFAF8;
}
.upload-area:hover, .upload-area:active { border-color: var(--primary); }
.upload-area .icon { font-size: 32px; margin-bottom: 8px; }
.upload-area .hint { font-size: 13px; color: var(--text-secondary); }
.upload-preview {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 12px;
}
.upload-preview .thumb {
  width: 72px;
  height: 72px;
  border-radius: 8px;
  object-fit: cover;
  border: 1px solid var(--border);
}
.upload-preview .thumb-wrap {
  position: relative;
  display: inline-block;
}
.thumb-wrap .remove {
  position: absolute;
  top: -6px;
  right: -6px;
  width: 20px;
  height: 20px;
  background: var(--danger);
  color: #FFF;
  border-radius: 50%;
  font-size: 12px;
  line-height: 20px;
  text-align: center;
  cursor: pointer;
  border: none;
}

/* 底部按钮 */
.footer-bar {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: #FFF;
  padding: 12px 20px;
  border-top: 1px solid var(--border);
  display: flex;
  gap: 10px;
  z-index: 100;
  max-width: 640px;
  margin: 0 auto;
}
.btn {
  flex: 1;
  padding: 12px;
  border-radius: 24px;
  font-size: 15px;
  font-weight: 500;
  cursor: pointer;
  border: none;
  transition: all 0.2s;
  text-align: center;
}
.btn:active { transform: scale(0.97); }
.btn-prev {
  background: var(--tag-bg);
  color: var(--text-secondary);
  flex: 0.4;
}
.btn-next {
  background: var(--primary);
  color: #FFF;
  flex: 1;
}
.btn-submit {
  background: #3C3226;
  color: #FFF;
  flex: 1;
}
.btn:disabled {
  opacity: 0.5;
  pointer-events: none;
}

/* 成功页 */
.success-page { text-align: center; padding: 60px 20px; }
.success-page .icon { font-size: 64px; margin-bottom: 16px; }
.success-page h2 { font-size: 22px; margin-bottom: 8px; }
.success-page p { color: var(--text-secondary); font-size: 14px; }

/* Toast */
.toast {
  position: fixed;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: #3C3226;
  color: #FFF;
  padding: 10px 24px;
  border-radius: 20px;
  font-size: 13px;
  z-index: 999;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s;
}
.toast.show { opacity: 1; }

.file-hidden { width:0.1px; height:0.1px; opacity:0; overflow:hidden; position:absolute; z-index:-1; }
</style>
</head>

const SUPABASE_ANON_KEY = 'sb_publishable_IMGPsOn6Dcqlo6SFa8ArEw_3a7mWJnv';

// 插入一条数据到 submissions 表
async function supabaseInsert(table, row) {
  const res = await fetch(SUPABASE_URL + '/rest/v1/' + table, {
    method: 'POST',
    headers: {
      'apikey': SUPABASE_ANON_KEY,
      'Authorization': 'Bearer ' + SUPABASE_ANON_KEY,
      'Content-Type': 'application/json',
      'Prefer': 'return=minimal'
    },
    body: JSON.stringify(row)
  });
  if (!res.ok) throw new Error('提交失败: ' + res.status + ' ' + (await res.text()));
  return true;
}

// 上传文件到 Storage
async function supabaseUpload(bucket, fileName, file) {
  const res = await fetch(SUPABASE_URL + '/storage/v1/object/' + bucket + '/' + fileName, {
    method: 'POST',
    headers: {
      'Authorization': 'Bearer ' + SUPABASE_ANON_KEY
    },
    body: file
  });
  if (!res.ok) throw new Error('上传失败: ' + res.status);
  return SUPABASE_URL + '/storage/v1/object/public/' + bucket + '/' + fileName;
}

            <span class="tag radio" data-field="existing_furniture" data-value="false" onclick="selectOne(this)">否</span>
          </div>
        </div>
        <div class="field">
          <label class="label">需要带到新家的东西（摆件、字画等）</label>
          <textarea class="textarea" id="brought_items_desc" placeholder="请描述需要带到新家的物品"></textarea>
        </div>
        <div class="field">
          <label class="label">物品照片（可多张）</label>
          <label class="upload-area">
            <div class="icon">📷</div>
            <div class="hint">点击上传物品照片</div>
            <input type="file" id="broughtUpload" accept="image/*" multiple onchange="handleUpload(this, 'brought_items')" class="file-hidden">

          <label class="label">参考图 — 希望新家的样子（可多张）</label>

      <div class="card" style="background:linear-gradient(135deg, #FBF7F2, #F7F2EA); border-color:#E0D5C5;">
        <div style="font-size:13px;color:var(--text-secondary);line-height:1.8;">
          <p>亲爱的客户，非常感谢您耐心写下对家的每一个期待。我们会像打造自己的家一样，珍视您的每一个想法与偏好，您提供的所有信息我们将严格保密。期待和您一起，把想象中的家变成现实！</p>
        </div>
      </div>
    </div>
  `;
}

// ========== 标签选择逻辑 ==========
function toggleTag(el) {
  el.classList.toggle('selected');
  collectMultiSelect(el.parentElement);
}

function selectOne(el) {
  const group = el.parentElement;
  group.querySelectorAll('.tag').forEach(t => t.classList.remove('selected'));
  el.classList.add('selected');
  const field = group.dataset.field;
  if (field) formData[field] = el.dataset.value;
}

function collectMultiSelect(group) {
  const field = group.dataset.field;
  if (!field) return;
  const selected = [];
  group.querySelectorAll('.tag.selected').forEach(t => selected.push(t.dataset.value));
  formData[field] = selected;
}

// ========== 图片上传 ==========
function handleUpload(input, type) {
  const files = Array.from(input.files);
  const key = type === 'brought_items' ? 'brought_items' : 'reference';
  const previewKey = key + '_preview';
  const previewDiv = document.getElementById(type === 'brought_items' ? 'broughtPreview' : 'refPreview');

  files.forEach(file => {
    formData[key + '_files'].push(file);
    const reader = new FileReader();
    reader.onload = function(e) {
      formData[previewKey].push(e.target.result);
      renderPreviews(previewDiv, formData[previewKey], previewKey, key + '_files');
    };
    reader.readAsDataURL(file);
  });
}

function renderPreviews(container, previews, previewKey, filesKey) {
  container.innerHTML = previews.map((url, i) => `
    <div class="thumb-wrap">
      <img class="thumb" src="${url}" alt="预览">
      <button class="remove" onclick="removePreview('${previewKey}','${filesKey}',${i})">×</button>
    </div>
  `).join('');
}

function removePreview(previewKey, filesKey, index) {
  formData[previewKey].splice(index, 1);
  formData[filesKey].splice(index, 1);
  const divId = filesKey === 'brought_items_files' ? 'broughtPreview' : 'refPreview';
  renderPreviews(document.getElementById(divId), formData[previewKey], previewKey, filesKey);
}

// ========== 步骤导航 ==========
function updateUI() {
  document.getElementById('progressFill').style.width = ((currentStep + 1) / totalSteps * 100) + '%';
  document.getElementById('stepName').textContent = steps[currentStep].name;
  document.getElementById('stepNum').textContent = (currentStep + 1) + '/' + totalSteps;

  document.querySelectorAll('.step').forEach((s, i) => {
    s.classList.toggle('active', i === currentStep);
  });

  const btnPrev = document.getElementById('btnPrev');
  const btnNext = document.getElementById('btnNext');
  const btnSubmit = document.getElementById('btnSubmit');

  btnPrev.style.display = currentStep === 0 ? 'none' : '';
  btnNext.style.display = currentStep === totalSteps - 1 ? 'none' : '';
  btnSubmit.style.display = currentStep === totalSteps - 1 ? '' : 'none';

  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function collectCurrentStep() {
  // Collect all multi-select fields on current step
  document.querySelectorAll('.step.active .tag-group[data-field]').forEach(group => {
    if (group.querySelector('.tag.radio')) {
      // Radio groups - already collected by selectOne
    } else {
      collectMultiSelect(group);
    }
  });
  // Collect text inputs
  document.querySelectorAll('.step.active .input, .step.active .textarea').forEach(input => {
    if (input.id) formData[input.id] = input.value;
  });
}

function nextStep() {
  collectCurrentStep();
  if (currentStep === 0) {
    const name = document.getElementById('name').value.trim();
    if (!name) { showToast('请填写姓名'); return; }
  }
  if (currentStep < totalSteps - 1) { currentStep++; updateUI(); }
}

function prevStep() {
  collectCurrentStep();
  if (currentStep > 0) { currentStep--; updateUI(); }
}

// ========== 收集全量数据 ==========
function collectAllData() {
  collectCurrentStep();

  // 收集所有步骤中可能还未进入 DOM 的字段（存储在了 formData 中）
  // 遍历所有步骤收集
  document.querySelectorAll('.step').forEach(step => {
    step.querySelectorAll('.input, .textarea').forEach(input => {
      if (input.id && formData[input.id] === undefined) formData[input.id] = input.value;
    });
  });

  // 递归收集所有 multi-select groups
  document.querySelectorAll('.tag-group[data-field]').forEach(group => {
    const field = group.dataset.field;
    // 检查是否有 .tag.radio（单选组）
    const hasRadio = group.querySelector('.tag.radio');
    if (hasRadio) {
      const selected = group.querySelector('.tag.radio.selected');
      if (selected) formData[field] = selected.dataset.value;
    } else {
      // 多选组 - 确保已收集
      const selected = [];
      group.querySelectorAll('.tag.selected').forEach(t => selected.push(t.dataset.value));
      if (selected.length > 0) formData[field] = selected;
    }
  });

  // Build submission object
  const data = {
    name: formData.name || document.getElementById('name')?.value || '',
    gender: formData.gender || null,
    age: formData.age ? parseInt(formData.age) : (document.getElementById('age')?.value ? parseInt(document.getElementById('age').value) : null),
    occupation: formData.occupation || document.getElementById('occupation')?.value || null,
    renovation_address: formData.renovation_address || document.getElementById('renovation_address')?.value || null,
    house_area: formData.house_area || document.getElementById('house_area')?.value || null,
    residents: formData.residents || [],
    residents_other: formData.residents_other || null,
    pets: formData.pets || [],
    pets_other: formData.pets_other || null,
    bedroom_count: formData.bedroom_count || null,
    bedroom_count_other: formData.bedroom_count_other || null,
    non_essential_spaces: formData.non_essential_spaces || [],
    non_essential_spaces_other: formData.non_essential_spaces_other || null,
    style_preferences: formData.style_preferences || null,
    style_other: formData.style_other || null,
    color_scheme: formData.color_scheme ? [formData.color_scheme] : [],
    color_scheme_other: formData.color_scheme_other || null,
    wall_materials: formData.wall_materials || null,
    wall_materials_other: formData.wall_materials_other || null,
    floor_material: formData.floor_material || null,
    cleaning_systems: formData.cleaning_systems || [],
    ac_heating: formData.ac_heating || [],
    ventilation: formData.ventilation || null,
    water_treatment: formData.water_treatment || null,
    smart_home: formData.smart_home || [],
    entryway_functions: formData.entryway_functions || [],
    entryway_functions_other: formData.entryway_functions_other || null,
    entryway_storage: formData.entryway_storage || [],
    entryway_privacy: formData.entryway_privacy || null,
    living_functions: formData.living_functions || [],
    living_functions_other: formData.living_functions_other || null,
    living_guest_frequency: formData.living_guest_frequency || null,
    living_guest_count: formData.living_guest_count ? parseInt(formData.living_guest_count) : null,
    living_dining_combined: formData.living_dining_combined === 'true' ? true : formData.living_dining_combined === 'false' ? false : null,
    living_guest_activities: formData.living_guest_activities || [],
    living_no_tv_design: formData.living_no_tv_design === 'true' ? true : formData.living_no_tv_design === 'false' ? false : null,
    living_instruments: formData.living_instruments === 'true' ? true : formData.living_instruments === 'false' ? false : null,
    living_instruments_other: formData.living_instruments_other || null,
    dining_table_type: formData.dining_table_type || null,
    dining_tv: formData.dining_tv === 'true' ? true : formData.dining_tv === 'false' ? false : null,
    dining_sideboard: formData.dining_sideboard || [],
    dining_sideboard_other: formData.dining_sideboard_other || null,
    kitchen_appliances: formData.kitchen_appliances || [],
    kitchen_fridge: formData.kitchen_fridge || null,
    kitchen_cook_frequency: formData.kitchen_cook_frequency || null,
    kitchen_open: formData.kitchen_open === 'true' ? true : formData.kitchen_open === 'false' ? false : null,
    master_bed_size: formData.master_bed_size || null,
    master_bed_style: formData.master_bed_style || null,
    master_reading: formData.master_reading === 'true' ? true : formData.master_reading === 'false' ? false : null,
    master_dressing_table: formData.master_dressing_table === 'true' ? true : formData.master_dressing_table === 'false' ? false : null,
    master_closet: formData.master_closet || null,
    master_bathroom_grooming: formData.master_bathroom_grooming === 'true' ? true : formData.master_bathroom_grooming === 'false' ? false : null,
    master_bathtub: formData.master_bathtub === 'true' ? true : formData.master_bathtub === 'false' ? false : null,
    master_av: formData.master_av || [],
    master_av_other: formData.master_av_other || null,
    master_water_bar: formData.master_water_bar === 'true' ? true : formData.master_water_bar === 'false' ? false : null,
    guest_function: formData.guest_function || [],
    guest_furniture: formData.guest_furniture || [],
    children_fixed: formData.children_fixed === 'true' ? true : formData.children_fixed === 'false' ? false : null,
    children_gender: formData.children_gender || null,
    children_age: formData.children_age ? parseInt(formData.children_age) : null,
    children_growth_design: formData.children_growth_design === 'true' ? true : formData.children_growth_design === 'false' ? false : null,
    children_hobbies: formData.children_hobbies || null,
    children_drawing_board: formData.children_drawing_board === 'true' ? true : formData.children_drawing_board === 'false' ? false : null,
    children_bookcase: formData.children_bookcase === 'true' ? true : formData.children_bookcase === 'false' ? false : null,
    study_activities: formData.study_activities || [],
    study_activities_other: formData.study_activities_other || null,
    study_users: formData.study_users || null,
    study_open: formData.study_open === 'true' ? true : formData.study_open === 'false' ? false : null,
    balcony_enclosed: formData.balcony_enclosed === 'true' ? true : formData.balcony_enclosed === 'false' ? false : null,
    balcony_uses: formData.balcony_uses || [],
    balcony_door_removed: formData.balcony_door_removed === 'true' ? true : formData.balcony_door_removed === 'false' ? false : null,
    existing_furniture: formData.existing_furniture === 'true' ? true : formData.existing_furniture === 'false' ? false : null,
    brought_items_desc: formData.brought_items_desc || null,
    extra_notes: formData.extra_notes || null
  };

  return data;
}

// ========== 上传图片到 Supabase Storage ==========
async function uploadImages(files, bucket, folder) {
  const urls = [];
  for (const file of files) {
    const fileName = folder + '/' + Date.now() + '_' + Math.random().toString(36).slice(2, 8) + '_' + file.name;
    try {
      const url = await supabaseUpload(bucket, fileName, file);
      urls.push(url);
    } catch(e) {
      console.error('Upload error:', e);
    }
  }
  return urls;
}

// ========== 提交表单 ==========
async function submitForm() {
  const data = collectAllData();

  if (!data.name || !data.name.trim()) {
    showToast('请至少填写姓名');
    currentStep = 0;
    updateUI();
    return;
  }

  const btn = document.getElementById('btnSubmit');
  btn.disabled = true;
  btn.textContent = '提交中...';

  try {
    // 上传图片
    let broughtUrls = [], refUrls = [];
    if (formData.brought_items_files && formData.brought_items_files.length > 0) {
      broughtUrls = await uploadImages(formData.brought_items_files, 'uploads', 'brought_items');
    }
    if (formData.reference_files && formData.reference_files.length > 0) {
      refUrls = await uploadImages(formData.reference_files, 'uploads', 'reference');
    }
    data.brought_items_photos = broughtUrls;
    data.reference_photos = refUrls;

    await supabaseInsert('submissions', data);

    // 显示成功页
    document.getElementById('formContainer').innerHTML = `
      <div class="success-page">
        <div class="icon">🎉</div>
        <h2>提交成功！</h2>
        <p>感谢您的耐心填写<br>我们会认真对待每一条需求<br>尽快为您呈现设计方案</p>
      </div>
    `;
    document.getElementById('footerBar').style.display = 'none';
    document.querySelector('.progress-wrap').style.display = 'none';
    document.getElementById('progressFill').style.width = '100%';
    document.getElementById('stepNum').textContent = '完成';
    document.getElementById('stepName').textContent = '提交成功';
  } catch (err) {
    console.error('Submit error:', err);
    showToast('提交失败，请重试');
    btn.disabled = false;
    btn.textContent = '提交需求表';
  }
}

// ========== Toast ==========
function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2000);
}

// ========== 初始化 ==========
renderForm();
updateUI();
</script>
