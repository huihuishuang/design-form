<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>管理后台 - 客户需求汇总</title>
<style>
:root {
  --bg: #F5F3F0;
  --card: #FFFFFF;
  --primary: #3C3226;
  --accent: #B8956A;
  --text: #2C2416;
  --text-secondary: #8B7355;
  --border: #E8E0D5;
  --tag-bg: #F5F0E8;
  --radius: 12px;
  --shadow: 0 2px 12px rgba(44,36,22,0.06);
  --green: #7C9A6E;
  --red: #C55555;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
}

/* 顶部导航 */
.navbar {
  background: var(--primary);
  color: #FFF;
  padding: 14px 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  position: sticky;
  top: 0;
  z-index: 100;
  flex-wrap: wrap;
  gap: 10px;
}
.navbar h1 { font-size: 18px; font-weight: 600; letter-spacing: 0.5px; white-space: nowrap; }
.navbar .stats {
  font-size: 13px;
  opacity: 0.85;
  display: flex;
  gap: 16px;
}
.navbar .stats .live-dot {
  display: inline-block;
  width: 8px;
  height: 8px;
  background: #5FDF5F;
  border-radius: 50%;
  animation: pulse 1.5s infinite;
  margin-right: 4px;
}
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.3; }
}

/* 主体布局 */
.container { max-width: 1200px; margin: 0 auto; padding: 16px; }

/* 工具栏 */
.toolbar {
  display: flex;
  gap: 10px;
  margin-bottom: 16px;
  flex-wrap: wrap;
  align-items: center;
}
.search-input {
  flex: 1;
  min-width: 200px;
  padding: 10px 16px;
  border: 1px solid var(--border);
  border-radius: 24px;
  font-size: 14px;
  background: #FFF;
  outline: none;
  font-family: inherit;
}
.search-input:focus { border-color: var(--accent); }
.btn {
  padding: 10px 20px;
  border-radius: 24px;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  border: none;
  transition: all 0.2s;
  white-space: nowrap;
  font-family: inherit;
}
.btn:active { transform: scale(0.97); }
.btn-outline {
  background: #FFF;
  color: var(--text-secondary);
  border: 1px solid var(--border);
}
.btn-primary {
  background: var(--accent);
  color: #FFF;
}
.btn-export {
  background: var(--green);
  color: #FFF;
}

/* 提交卡片列表 */
.submissions-grid {
  display: grid;
  gap: 12px;
}
.submission-card {
  background: var(--card);
  border-radius: var(--radius);
  border: 1px solid var(--border);
  box-shadow: var(--shadow);
  overflow: hidden;
  transition: border-color 0.3s;
}
.submission-card.new-highlight {
  border-color: var(--accent);
  animation: highlightPulse 2s ease;
}
@keyframes highlightPulse {
  0% { box-shadow: 0 0 0 0 rgba(184,149,106,0.4); }
  100% { box-shadow: 0 0 0 12px rgba(184,149,106,0); }
}

.card-header {
  padding: 14px 18px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  cursor: pointer;
  user-select: none;
  transition: background 0.2s;
}
.card-header:hover { background: #FAFAF8; }
.card-header .left { display: flex; align-items: center; gap: 12px; flex: 1; min-width: 0; }
.card-header .avatar {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--accent), #D4C4A8);
  color: #FFF;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  font-weight: 600;
  flex-shrink: 0;
}
.card-header .info { min-width: 0; }
.card-header .name { font-weight: 600; font-size: 15px; }
.card-header .meta { font-size: 12px; color: var(--text-secondary); display: flex; gap: 12px; flex-wrap: wrap; }
.card-header .right { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
.card-header .arrow {
  font-size: 12px;
  color: var(--text-secondary);
  transition: transform 0.3s;
}
.card-header .arrow.open { transform: rotate(180deg); }

.card-body { display: none; padding: 0 18px 18px; border-top: 1px solid var(--border); }
.card-body.open { display: block; }

.detail-section {
  margin-top: 20px;
  background: #FAFAF8;
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 16px;
}
.detail-section h4 {
  font-size: 15px;
  font-weight: 600;
  color: #5C4A3A;
  margin-bottom: 12px;
  padding-bottom: 8px;
  border-bottom: 2px solid var(--accent);
  display: flex;
  align-items: center;
  gap: 6px;
}
.detail-row {
  display: flex;
  padding: 6px 0;
  font-size: 13px;
  line-height: 1.7;
}
.detail-label {
  color: var(--text-secondary);
  flex-shrink: 0;
  width: 120px;
}
.detail-value { flex: 1; color: var(--text); }
.detail-tags { display: flex; flex-wrap: wrap; gap: 4px; }
.detail-tag {
  display: inline-block;
  padding: 2px 10px;
  background: var(--tag-bg);
  border-radius: 12px;
  font-size: 12px;
  color: var(--text-secondary);
}
.detail-photos { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
.detail-photos img {
  width: 100px;
  height: 100px;
  object-fit: cover;
  border-radius: 8px;
  border: 1px solid var(--border);
  cursor: pointer;
  transition: transform 0.2s;
}
.detail-photos img:hover { transform: scale(1.05); }

/* 空状态 */
.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-secondary);
}
.empty-state .icon { font-size: 48px; margin-bottom: 12px; }

/* Toast */
.toast {
  position: fixed;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--primary);
  color: #FFF;
  padding: 10px 24px;
  border-radius: 20px;
  font-size: 13px;
  z-index: 999;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s;
}
.toast.show { opacity: 1; }

/* Modal */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  z-index: 200;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  animation: fadeIn 0.2s;
}
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
.modal-content {
  background: #FFF;
  border-radius: var(--radius);
  max-width: 700px;
  width: 100%;
  max-height: 85vh;
  overflow-y: auto;
  padding: 24px;
  position: relative;
}
.modal-close {
  position: absolute;
  top: 12px;
  right: 16px;
  font-size: 24px;
  background: none;
  border: none;
  cursor: pointer;
  color: var(--text-secondary);
}

/* 编辑/删除按钮 */
.btn-sm {
  padding: 6px 12px;
  border-radius: 16px;
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  border: none;
  transition: all 0.2s;
  font-family: inherit;
}
.btn-sm:active { transform: scale(0.95); }
.btn-edit {
  background: #F0E6D8;
  color: var(--accent);
}
.btn-delete {
  background: #FDE8E8;
  color: var(--red);
}

/* 编辑弹窗 */
.edit-modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  z-index: 200;
  display: flex;
  align-items: flex-start;
  justify-content: center;
  padding: 20px;
  animation: fadeIn 0.2s;
  overflow-y: auto;
}
.edit-modal {
  background: #FFF;
  border-radius: var(--radius);
  max-width: 700px;
  width: 100%;
  padding: 24px;
  position: relative;
  margin: 20px 0;
}
.edit-modal h2 {
  font-size: 18px;
  margin-bottom: 16px;
  padding-right: 30px;
}
.edit-modal .modal-close {
  position: absolute;
  top: 16px;
  right: 16px;
  font-size: 24px;
  background: none;
  border: none;
  cursor: pointer;
  color: var(--text-secondary);
}
.edit-section {
  margin-bottom: 16px;
  border: 1px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
}
.edit-section-title {
  background: var(--tag-bg);
  padding: 10px 14px;
  font-size: 13px;
  font-weight: 600;
  color: var(--accent);
  cursor: pointer;
  display: flex;
  justify-content: space-between;
  align-items: center;
  user-select: none;
}
.edit-section-title:hover { background: #EDE8DD; }
.edit-section-body {
  padding: 12px 14px;
  display: none;
}
.edit-section-body.open { display: block; }
.edit-field { margin-bottom: 12px; }
.edit-field:last-child { margin-bottom: 0; }
.edit-field label {
  display: block;
  font-size: 12px;
  color: var(--text-secondary);
  margin-bottom: 4px;
}
.edit-field input, .edit-field textarea, .edit-field select {
  width: 100%;
  padding: 8px 12px;
  border: 1px solid var(--border);
  border-radius: 6px;
  font-size: 14px;
  font-family: inherit;
  color: var(--text);
  background: #FAFAF8;
}
.edit-field input:focus, .edit-field textarea:focus, .edit-field select:focus {
  outline: none;
  border-color: var(--accent);
  background: #FFF;
}
.edit-field textarea { min-height: 60px; resize: vertical; }
.edit-photos {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 4px;
}
.edit-photos .thumb-wrap {
  position: relative;
  display: inline-block;
}
.edit-photos .thumb-wrap img {
  width: 80px;
  height: 80px;
  object-fit: cover;
  border-radius: 6px;
  border: 1px solid var(--border);
}
.edit-photos .thumb-wrap .remove-photo {
  position: absolute;
  top: -6px;
  right: -6px;
  width: 20px;
  height: 20px;
  background: var(--red);
  color: #FFF;
  border-radius: 50%;
  font-size: 12px;
  line-height: 20px;
  text-align: center;
  cursor: pointer;
  border: none;
}
.edit-modal-actions {
  display: flex;
  gap: 10px;
  margin-top: 20px;
  position: sticky;
  bottom: 0;
  background: #FFF;
  padding-top: 12px;
  border-top: 1px solid var(--border);
}
.edit-modal-actions .btn {
  flex: 1;
  padding: 12px;
  border-radius: 24px;
  font-size: 15px;
  font-weight: 500;
  cursor: pointer;
  border: none;
  transition: all 0.2s;
  font-family: inherit;
}
.edit-modal-actions .btn-save {
  background: var(--accent);
  color: #FFF;
}
.edit-modal-actions .btn-cancel {
  background: var(--tag-bg);
  color: var(--text-secondary);
}

/* 确认对话框 */
.confirm-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: 250;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  animation: fadeIn 0.2s;
}
.confirm-box {
  background: #FFF;
  border-radius: var(--radius);
  padding: 24px;
  max-width: 360px;
  width: 100%;
  text-align: center;
}
.confirm-box p { margin-bottom: 20px; font-size: 15px; color: var(--text); }
.confirm-box .btn-row { display: flex; gap: 10px; }
.confirm-box .btn-row .btn { flex: 1; }

@media (max-width: 640px) {
  .navbar { padding: 12px 14px; }
  .navbar h1 { font-size: 16px; }
  .detail-row { flex-direction: column; }
  .detail-label { width: auto; margin-bottom: 2px; }
}
</style>
</head>
<body>

<div class="navbar">
  <h1>客户需求汇总</h1>
  <div class="stats">
    <span><span class="live-dot"></span>实时监控中</span>
    <span>共 <strong id="totalCount">0</strong> 份需求</span>
  </div>
</div>

<div class="container">
  <div class="toolbar">
    <input class="search-input" id="searchInput" placeholder="搜索客户姓名..." oninput="filterCards()">
    <button class="btn btn-outline" onclick="sortByDate()">按时间排序 ↓</button>
    <button class="btn btn-export" onclick="exportCSV()">导出 Excel</button>
    <button class="btn btn-primary" onclick="refreshData()">手动刷新</button>
  </div>

  <div class="submissions-grid" id="submissionsGrid">
    <div class="empty-state">
      <div class="icon">📋</div>
      <p>暂无客户提交需求</p>
      <p style="font-size:12px;margin-top:4px;">分享表单链接给客户后，提交数据将实时显示在这里</p>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- 编辑弹窗 -->
<div class="edit-modal-overlay" id="editModal" style="display:none;">
  <div class="edit-modal" id="editModalContent"></div>
</div>

<!-- 删除确认 -->
<div class="confirm-overlay" id="confirmDialog" style="display:none;">
  <div class="confirm-box">
    <p><strong>确定要删除这条需求吗？</strong><br><span style="font-size:13px;color:var(--text-secondary)">此操作不可撤销</span></p>
    <div class="btn-row">
      <button class="btn btn-cancel" onclick="closeConfirm()">取消</button>
      <button class="btn" style="background:var(--red);color:#FFF;" id="confirmDeleteBtn" onclick="executeDelete()">确认删除</button>
    </div>
  </div>
</div>

<script>
// ========== Supabase 配置 ==========
// 直接调用 REST API，不依赖 CDN，国内可用
const SUPABASE_URL = 'https://xxudurgiwtgsxrprnlht.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_IMGPsOn6Dcqlo6SFa8ArEw_3a7mWJnv';

// 查询 submissions 表
async function supabaseSelect(table) {
  const res = await fetch(SUPABASE_URL + '/rest/v1/' + table + '?select=*&order=created_at.desc', {
    headers: {
      'apikey': SUPABASE_ANON_KEY,
      'Authorization': 'Bearer ' + SUPABASE_ANON_KEY
    }
  });
  if (!res.ok) throw new Error('查询失败: ' + res.status);
  return await res.json();
}

// 更新一条 submission
async function supabaseUpdate(id, data) {
  const res = await fetch(SUPABASE_URL + '/rest/v1/submissions?id=eq.' + id, {
    method: 'PATCH',
    headers: {
      'apikey': SUPABASE_ANON_KEY,
      'Authorization': 'Bearer ' + SUPABASE_ANON_KEY,
      'Content-Type': 'application/json',
      'Prefer': 'return=minimal'
    },
    body: JSON.stringify(data)
  });
  if (!res.ok) throw new Error('更新失败: ' + res.status);
  return true;
}

// 删除一条 submission
async function supabaseDelete(id) {
  const res = await fetch(SUPABASE_URL + '/rest/v1/submissions?id=eq.' + id, {
    method: 'DELETE',
    headers: {
      'apikey': SUPABASE_ANON_KEY,
      'Authorization': 'Bearer ' + SUPABASE_ANON_KEY,
      'Prefer': 'return=minimal'
    }
  });
  if (!res.ok) throw new Error('删除失败: ' + res.status);
  return true;
}

let allSubmissions = [];
let orderDesc = true;
let lastMaxTime = null;  // 用于轮询增量数据

// ========== 字段中文映射 ==========
const fieldLabels = {
  name: '姓名', gender: '性别', age: '年龄', occupation: '职业',
  renovation_address: '装修地址', house_area: '房屋面积',
  residents: '常驻人员', residents_other: '常驻人员-其他',
  pets: '宠物', pets_other: '宠物-其他',
  bedroom_count: '保留卧室数量', bedroom_count_other: '卧室数量-更多',
  non_essential_spaces: '非刚需空间', non_essential_spaces_other: '非刚需空间-其他',
  style_preferences: '风格意向', style_other: '风格意向-其他',
  color_scheme: '整体配色', color_scheme_other: '整体配色-其他',
  wall_materials: '墙面材质', wall_materials_other: '墙面材质-其他',
  floor_material: '地面材质',
  cleaning_systems: '清洁系统',
  ac_heating: '空调/供暖',
  ventilation: '新风系统',
  water_treatment: '水处理系统',
  smart_home: '智能家居',
  entryway_functions: '玄关功能', entryway_functions_other: '玄关功能-其他',
  entryway_storage: '玄关储物', entryway_privacy: '入户直观全室',
  living_functions: '客厅功能', living_functions_other: '客厅功能-其他',
  living_guest_frequency: '接待频率', living_guest_count: '接待人数',
  living_dining_combined: '客餐厅一体', living_guest_activities: '聚会活动',
  living_no_tv_design: '去客厅化设计', living_instruments: '有乐器', living_instruments_other: '乐器类型',
  dining_table_type: '餐桌类型', dining_tv: '餐厅看电视',
  dining_sideboard: '餐边柜功能', dining_sideboard_other: '餐边柜-其他',
  kitchen_appliances: '厨房电器', kitchen_fridge: '冰箱容量',
  kitchen_cook_frequency: '开伙频率', kitchen_open: '开放式厨房',
  master_bed_size: '床尺寸', master_bed_style: '床样式',
  master_reading: '床上阅读', master_dressing_table: '梳妆台',
  master_closet: '衣帽间', master_bathroom_grooming: '卫生间梳妆',
  master_bathtub: '泡澡需求', master_av: '视听设备', master_av_other: '视听设备-其他',
  master_water_bar: '水吧',
  guest_function: '次卧功能', guest_furniture: '次卧家具',
  children_fixed: '儿童房固定规划', children_gender: '孩子性别', children_age: '孩子年龄',
  children_growth_design: '成长阶段设计', children_hobbies: '孩子爱好',
  children_drawing_board: '画板', children_bookcase: '书柜',
  study_activities: '书房活动', study_activities_other: '书房活动-其他',
  study_users: '使用人数', study_open: '开放式书房',
  balcony_enclosed: '封阳台', balcony_uses: '阳台用途', balcony_door_removed: '阳台门拆除连通',
  existing_furniture: '原有家具', brought_items_desc: '带到新家的物品',
  brought_items_photos: '物品照片', reference_photos: '参考图片',
  extra_notes: '其他补充'
};

const boolLabels = { true: '是', false: '否', null: '-' };

// ========== 渲染卡片 ==========
function renderCards(submissions) {
  const grid = document.getElementById('submissionsGrid');
  document.getElementById('totalCount').textContent = allSubmissions.length;

  if (!submissions || submissions.length === 0) {
    const searchVal = document.getElementById('searchInput').value;
    grid.innerHTML = `
      <div class="empty-state">
        <div class="icon">${searchVal ? '🔍' : '📋'}</div>
        <p>${searchVal ? '没有匹配的客户' : '暂无客户提交需求'}</p>
        <p style="font-size:12px;margin-top:4px;">${searchVal ? '' : '分享表单链接给客户后，提交数据将实时显示在这里'}</p>
      </div>
    `;
    return;
  }

  grid.innerHTML = submissions.map((s, idx) => {
    const initial = (s.name || '?')[0];
    const time = new Date(s.created_at).toLocaleString('zh-CN', {
      year: 'numeric', month: '2-digit', day: '2-digit',
      hour: '2-digit', minute: '2-digit'
    });
    const styleText = (s.style_preferences || []).join('、') || '未填写';
    const bedroomText = s.bedroom_count || '-';

    return `
    <div class="submission-card" data-id="${s.id}">
      <div class="card-header" onclick="toggleCard(this, '${s.id}')">
        <div class="left">
          <div class="avatar">${initial}</div>
          <div class="info">
            <div class="name">${escapeHtml(s.name || '未填姓名')} ${s.gender || ''}</div>
            <div class="meta">
              <span>🕐 ${time}</span>
              <span>🛏️ ${bedroomText}</span>
              <span>🎨 ${styleText}</span>
            </div>
          </div>
        </div>
        <div class="right">
          <button class="btn-sm btn-edit" onclick="event.stopPropagation();openEdit('${s.id}')">✏️ 编辑</button>
          <button class="btn-sm btn-delete" onclick="event.stopPropagation();confirmDelete('${s.id}','${escapeHtml(s.name || '未填姓名')}')">🗑️</button>
          <span style="font-size:12px;color:var(--text-secondary)">#${idx + 1}</span>
          <span class="arrow" id="arrow_${s.id}">▼</span>
        </div>
      </div>
      <div class="card-body" id="body_${s.id}">
        ${renderDetail(s)}
      </div>
    </div>`;
  }).join('');
}

// boolean 字段列表：即使未填也显示
const booleanFields = new Set([
  'living_dining_combined','living_no_tv_design','living_instruments',
  'dining_tv','kitchen_open','master_reading','master_dressing_table',
  'master_bathroom_grooming','master_bathtub','master_water_bar',
  'children_fixed','children_growth_design','children_drawing_board',
  'children_bookcase','study_open','balcony_enclosed',
  'balcony_door_removed','existing_furniture'
]);

function renderDetail(s) {
  const sections = [
    { title: '一、客户基本情况', fields: ['name','gender','age','occupation','renovation_address','house_area','residents','residents_other','pets','pets_other'] },
    { title: '二、空间分配与风格', fields: ['bedroom_count','bedroom_count_other','non_essential_spaces','non_essential_spaces_other','style_preferences','style_other','color_scheme','color_scheme_other'] },
    { title: '三、舒适家居系统', fields: ['wall_materials','wall_materials_other','floor_material','cleaning_systems','ac_heating','ventilation','water_treatment','smart_home'] },
    { title: '四、玄关·客厅·餐厅', fields: ['entryway_functions','entryway_functions_other','entryway_storage','entryway_privacy','living_functions','living_functions_other','living_guest_frequency','living_guest_count','living_dining_combined','living_guest_activities','living_no_tv_design','living_instruments','living_instruments_other','dining_table_type','dining_tv','dining_sideboard','dining_sideboard_other'] },
    { title: '五、厨房·主卧', fields: ['kitchen_appliances','kitchen_fridge','kitchen_cook_frequency','kitchen_open','master_bed_size','master_bed_style','master_reading','master_dressing_table','master_closet','master_bathroom_grooming','master_bathtub','master_av','master_av_other','master_water_bar'] },
    { title: '六、次卧·儿童房·书房', fields: ['guest_function','guest_furniture','children_fixed','children_gender','children_age','children_growth_design','children_hobbies','children_drawing_board','children_bookcase','study_activities','study_activities_other','study_users','study_open'] },
    { title: '七、阳台·其他', fields: ['balcony_enclosed','balcony_uses','balcony_door_removed','existing_furniture','brought_items_desc','extra_notes'] }
  ];

  let html = '';
  for (const sec of sections) {
    let hasContent = false;
    let secHtml = '';
    for (const field of sec.fields) {
      const val = s[field];
      // boolean 字段总是显示，其他字段跳过空值
      if (!booleanFields.has(field) && (val === null || val === undefined || val === '' || (Array.isArray(val) && val.length === 0))) continue;
      hasContent = true;
      const label = fieldLabels[field] || field;
      secHtml += `<div class="detail-row"><span class="detail-label">${label}</span><span class="detail-value">${formatValue(field, val)}</span></div>`;
    }
    if (hasContent) {
      html += `<div class="detail-section"><h4>${sec.title}</h4>${secHtml}</div>`;
    }
  }

  // Photos
  const broughtPhotos = s.brought_items_photos || [];
  const refPhotos = s.reference_photos || [];
  if (broughtPhotos.length > 0) {
    html += `<div class="detail-section"><h4>物品照片</h4><div class="detail-photos">${broughtPhotos.map(url => `<img src="${url}" onclick="showImage('${url}')" loading="lazy">`).join('')}</div></div>`;
  }
  if (refPhotos.length > 0) {
    html += `<div class="detail-section"><h4>参考图片</h4><div class="detail-photos">${refPhotos.map(url => `<img src="${url}" onclick="showImage('${url}')" loading="lazy">`).join('')}</div></div>`;
  }

  return html || '<div style="padding:20px;text-align:center;color:var(--text-secondary)">暂无详细信息</div>';
}

function formatValue(field, val) {
  if (val === true) return '<span style="color:#7C9A6E;">是</span>';
  if (val === false) return '<span style="color:#C55555;">否</span>';
  if (val === null && booleanFields.has(field)) return '<span style="color:#AAA;">未填</span>';
  if (Array.isArray(val)) {
    return `<div class="detail-tags">${val.map(v => `<span class="detail-tag">${v}</span>`).join('')}</div>`;
  }
  if (field === 'created_at') {
    return new Date(val).toLocaleString('zh-CN');
  }
  return escapeHtml(String(val));
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// ========== 卡片展开/折叠 ==========
function toggleCard(header, id) {
  const body = document.getElementById('body_' + id);
  const arrow = document.getElementById('arrow_' + id);
  body.classList.toggle('open');
  arrow.classList.toggle('open');
}

// ========== 搜索过滤 ==========
function filterCards() {
  const keyword = document.getElementById('searchInput').value.trim().toLowerCase();
  if (!keyword) { renderCards(allSubmissions); return; }
  const filtered = allSubmissions.filter(s =>
    (s.name || '').toLowerCase().includes(keyword) ||
    (s.occupation || '').toLowerCase().includes(keyword) ||
    (s.style_preferences || []).some(st => st.toLowerCase().includes(keyword))
  );
  renderCards(filtered);
}

// ========== 排序 ==========
function sortByDate() {
  orderDesc = !orderDesc;
  const sorted = [...allSubmissions].sort((a, b) => {
    const da = new Date(a.created_at), db = new Date(b.created_at);
    return orderDesc ? db - da : da - db;
  });
  const btn = document.querySelector('.btn-outline');
  btn.textContent = orderDesc ? '按时间排序 ↓' : '按时间排序 ↑';
  renderCards(sorted);
}

// ========== 图片放大 ==========
function showImage(url) {
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.innerHTML = `<div class="modal-content" style="text-align:center;background:transparent;max-width:90vw;"><button class="modal-close" style="color:#FFF;font-size:30px;" onclick="this.parentElement.parentElement.remove()">×</button><img src="${url}" style="max-width:100%;max-height:80vh;border-radius:8px;"></div>`;
  overlay.addEventListener('click', function(e) { if (e.target === overlay) overlay.remove(); });
  document.body.appendChild(overlay);
}

// ========== 导出 CSV ==========
function exportCSV() {
  if (allSubmissions.length === 0) { showToast('没有数据可导出'); return; }

  const headers = Object.keys(fieldLabels);
  const rows = allSubmissions.map(s => {
    return headers.map(h => {
      const val = s[h];
      if (val === null || val === undefined) return '';
      if (Array.isArray(val)) return val.join('、');
      if (typeof val === 'boolean') return val ? '是' : '否';
      return String(val).replace(/,/g, '，').replace(/"/g, '""');
    }).join(',');
  });

  const BOM = '﻿';
  const csv = BOM + headers.map(h => fieldLabels[h]).join(',') + '\n' + rows.join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = '客户需求汇总_' + new Date().toISOString().slice(0,10) + '.csv';
  a.click();
  URL.revokeObjectURL(url);
  showToast('导出成功！用 Excel 打开即可');
}

// ========== 加载数据 ==========
async function loadData() {
  try {
    const data = await supabaseSelect('submissions');
    allSubmissions = data || [];
    if (data.length > 0) lastMaxTime = data[0].created_at;
    sortByDate();
  } catch(e) {
    console.error('Load error:', e);
  }
}

async function refreshData() {
  await loadData();
  document.getElementById('searchInput').value = '';
  showToast('数据已刷新');
}

// ========== 轮询监听新提交（代替 WebSocket 实时推送）==========
function setupPolling() {
  setInterval(async () => {
    try {
      const res = await fetch(SUPABASE_URL + '/rest/v1/submissions?select=*&order=created_at.desc&limit=1', {
        headers: {
          'apikey': SUPABASE_ANON_KEY,
          'Authorization': 'Bearer ' + SUPABASE_ANON_KEY
        }
      });
      if (!res.ok) return;
      const rows = await res.json();
      if (rows.length === 0) return;
      const latest = rows[0];
      // 检查是否有新数据
      if (lastMaxTime && new Date(latest.created_at) > new Date(lastMaxTime)) {
        allSubmissions.unshift(latest);
        const searchVal = document.getElementById('searchInput').value.trim();
        if (!searchVal) {
          renderCards(allSubmissions);
          setTimeout(() => {
            const newCard = document.querySelector(`[data-id="${latest.id}"]`);
            if (newCard) {
              newCard.classList.add('new-highlight');
              setTimeout(() => newCard.classList.remove('new-highlight'), 2500);
            }
          }, 100);
        }
        document.getElementById('totalCount').textContent = allSubmissions.length;
        showToast(`新需求！${latest.name || '未知客户'} 刚刚提交了需求表`);
      }
      lastMaxTime = latest.created_at;
    } catch(e) { /* silent fail for polling */ }
  }, 5000); // 每5秒检查一次
}

// ========== 编辑功能 ==========
let pendingDeleteId = null;
let editingSubmission = null;

function toggleEditSection(el) {
  el.nextElementSibling.classList.toggle('open');
  el.querySelector('.toggle-icon').textContent =
    el.nextElementSibling.classList.contains('open') ? '▾' : '▸';
}

function openEdit(id) {
  editingSubmission = allSubmissions.find(s => s.id === id);
  if (!editingSubmission) return;
  const modal = document.getElementById('editModal');
  modal.style.display = 'flex';
  document.getElementById('editModalContent').innerHTML = generateEditForm(editingSubmission);
}

function closeEdit() {
  document.getElementById('editModal').style.display = 'none';
  editingSubmission = null;
}

// 关闭弹窗（点击遮罩）
document.getElementById('editModal').addEventListener('click', function(e) {
  if (e.target === this) closeEdit();
});

function generateEditForm(s) {
  const editSections = [
    { title: '一、客户基本情况', fields: ['name','gender','age','occupation','renovation_address','house_area','residents','residents_other','pets','pets_other'] },
    { title: '二、空间分配与风格', fields: ['bedroom_count','bedroom_count_other','non_essential_spaces','non_essential_spaces_other','style_preferences','style_other','color_scheme','color_scheme_other'] },
    { title: '三、舒适家居系统', fields: ['wall_materials','wall_materials_other','floor_material','cleaning_systems','ac_heating','ventilation','water_treatment','smart_home'] },
    { title: '四、玄关·客厅·餐厅', fields: ['entryway_functions','entryway_functions_other','entryway_storage','entryway_privacy','living_functions','living_functions_other','living_guest_frequency','living_guest_count','living_dining_combined','living_guest_activities','living_no_tv_design','living_instruments','living_instruments_other','dining_table_type','dining_tv','dining_sideboard','dining_sideboard_other'] },
    { title: '五、厨房·主卧', fields: ['kitchen_appliances','kitchen_fridge','kitchen_cook_frequency','kitchen_open','master_bed_size','master_bed_style','master_reading','master_dressing_table','master_closet','master_bathroom_grooming','master_bathtub','master_av','master_av_other','master_water_bar'] },
    { title: '六、次卧·儿童房·书房', fields: ['guest_function','guest_furniture','children_fixed','children_gender','children_age','children_growth_design','children_hobbies','children_drawing_board','children_bookcase','study_activities','study_activities_other','study_users','study_open'] },
    { title: '七、阳台·其他', fields: ['balcony_enclosed','balcony_uses','balcony_door_removed','existing_furniture','brought_items_desc','extra_notes'] }
  ];

  let html = `<h2>✏️ 编辑 — ${escapeHtml(s.name || '未填姓名')}</h2>
  <button class="modal-close" onclick="closeEdit()">×</button>`;

  for (const sec of editSections) {
    let bodyHtml = '';
    for (const field of sec.fields) {
      const val = s[field];
      const label = fieldLabels[field] || field;

      // 跳过图片字段（单独处理）
      if (field === 'brought_items_photos' || field === 'reference_photos') continue;

      if (Array.isArray(val)) {
        bodyHtml += `<div class="edit-field">
          <label>${label}</label>
          <input id="edit_${field}" value="${escapeHtml(val.join('、'))}" placeholder="多个用、分隔">
        </div>`;
      } else if (typeof val === 'boolean') {
        bodyHtml += `<div class="edit-field">
          <label>${label}</label>
          <select id="edit_${field}">
            <option value="">-</option>
            <option value="true" ${val === true ? 'selected' : ''}>是</option>
            <option value="false" ${val === false ? 'selected' : ''}>否</option>
          </select>
        </div>`;
      } else if (field === 'created_at') {
        // 不编辑创建时间
      } else {
        bodyHtml += `<div class="edit-field">
          <label>${label}</label>
          <input id="edit_${field}" value="${escapeHtml(val || '')}">
        </div>`;
      }
    }
    html += `<div class="edit-section">
      <div class="edit-section-title" onclick="toggleEditSection(this)">
        <span>${sec.title}</span><span class="toggle-icon">▸</span>
      </div>
      <div class="edit-section-body">${bodyHtml}</div>
    </div>`;
  }

  // 图片管理
  const broughtPhotos = s.brought_items_photos || [];
  const refPhotos = s.reference_photos || [];
  if (broughtPhotos.length > 0 || refPhotos.length > 0) {
    let photoHtml = '';
    if (broughtPhotos.length > 0) {
      photoHtml += `<label style="font-size:12px;color:var(--text-secondary);margin-top:8px;display:block;">物品照片（点击 × 删除）</label>
      <div class="edit-photos" id="editBroughtPhotos">${broughtPhotos.map((url, i) => `
        <div class="thumb-wrap">
          <img src="${url}" loading="lazy">
          <button class="remove-photo" onclick="removeEditPhoto('${s.id}','brought_items_photos',${i})">×</button>
        </div>`).join('')}</div>`;
    }
    if (refPhotos.length > 0) {
      photoHtml += `<label style="font-size:12px;color:var(--text-secondary);margin-top:8px;display:block;">参考图片（点击 × 删除）</label>
      <div class="edit-photos" id="editRefPhotos">${refPhotos.map((url, i) => `
        <div class="thumb-wrap">
          <img src="${url}" loading="lazy">
          <button class="remove-photo" onclick="removeEditPhoto('${s.id}','reference_photos',${i})">×</button>
        </div>`).join('')}</div>`;
    }
    html += `<div class="edit-section">
      <div class="edit-section-title" onclick="toggleEditSection(this)">
        <span>📷 图片管理</span><span class="toggle-icon">▸</span>
      </div>
      <div class="edit-section-body">${photoHtml}</div>
    </div>`;
  }

  html += `<div class="edit-modal-actions">
    <button class="btn btn-cancel" onclick="closeEdit()">取消</button>
    <button class="btn btn-save" onclick="saveEdit('${s.id}')">💾 保存修改</button>
  </div>`;

  return html;
}

async function saveEdit(id) {
  const btn = document.querySelector('.btn-save');
  btn.disabled = true;
  btn.textContent = '保存中...';

  const s = editingSubmission;
  if (!s) return;

  const data = {};

  // 收集所有编辑字段
  document.querySelectorAll('[id^="edit_"]').forEach(el => {
    const field = el.id.replace('edit_', '');
    if (el.tagName === 'SELECT') {
      const v = el.value;
      if (v === 'true') data[field] = true;
      else if (v === 'false') data[field] = false;
      else if (v === '') data[field] = null;
      else data[field] = v;
    } else {
      const val = el.value.trim();
      // 判断原值是否是数组
      if (Array.isArray(s[field])) {
        data[field] = val ? val.split(/[、,，]/).map(v => v.trim()).filter(Boolean) : [];
      } else if (field === 'age' || field === 'children_age' || field === 'living_guest_count') {
        data[field] = val ? parseInt(val) : null;
      } else {
        data[field] = val || null;
      }
    }
  });

  // 保留已更新过的图片数组
  if (s._broughtPhotos !== undefined) data.brought_items_photos = s._broughtPhotos;
  if (s._refPhotos !== undefined) data.reference_photos = s._refPhotos;

  try {
    await supabaseUpdate(id, data);
    showToast('✅ 保存成功！');
    closeEdit();
    await loadData();
  } catch (err) {
    console.error('Save error:', err);
    showToast('保存失败，请重试');
  } finally {
    btn.disabled = false;
    btn.textContent = '💾 保存修改';
  }
}

async function removeEditPhoto(submissionId, field, index) {
  if (!editingSubmission) return;

  // 初始化副本
  if (field === 'brought_items_photos') {
    if (!editingSubmission._broughtPhotos) editingSubmission._broughtPhotos = [...(editingSubmission.brought_items_photos || [])];
    editingSubmission._broughtPhotos.splice(index, 1);
    // 更新UI
    const container = document.getElementById('editBroughtPhotos');
    if (container) {
      container.querySelectorAll('.thumb-wrap')[index]?.remove();
    }
  } else {
    if (!editingSubmission._refPhotos) editingSubmission._refPhotos = [...(editingSubmission.reference_photos || [])];
    editingSubmission._refPhotos.splice(index, 1);
    const container = document.getElementById('editRefPhotos');
    if (container) {
      container.querySelectorAll('.thumb-wrap')[index]?.remove();
    }
  }
  showToast('已标记删除，保存后生效');
}

// ========== 删除功能 ==========
function confirmDelete(id, name) {
  pendingDeleteId = id;
  document.getElementById('confirmDialog').style.display = 'flex';
}

function closeConfirm() {
  pendingDeleteId = null;
  document.getElementById('confirmDialog').style.display = 'none';
}

document.getElementById('confirmDialog').addEventListener('click', function(e) {
  if (e.target === this) closeConfirm();
});

async function executeDelete() {
  if (!pendingDeleteId) return;
  const btn = document.getElementById('confirmDeleteBtn');
  btn.disabled = true;
  btn.textContent = '删除中...';

  try {
    await supabaseDelete(pendingDeleteId);
    showToast('已删除');
    closeConfirm();
    await loadData();
  } catch (err) {
    console.error('Delete error:', err);
    showToast('删除失败，请重试');
  } finally {
    btn.disabled = false;
    btn.textContent = '确认删除';
  }
}

// ========== Toast ==========
function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2500);
}

// ========== 初始化 ==========
loadData();
setupPolling();
</script>
